<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>Alice och den kallaste planeten</title>
<meta name="description" content="Ett rymdäventyr av Alice &amp; Pappa — hitta pappa på den kallaste planeten!">
<meta name="theme-color" content="#1a0f3a">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="apple-touch-icon" href="icons/apple-180.png">
<link rel="stylesheet" href="css/style.css">
<script>
// ES2018-featuretest (körs som ES5). Gamla webbläsare får ett vänligt besked.
(function () {
  try {
    new Function('"use strict"; class A{constructor(){this.x=1}} const {a=1}={}; var b=[...[1]]; async function f(){await 0} var t=`x`; var o=Object.assign({},{c:2}); (function(x=1){return x})();');
  } catch (e) {
    window.__oldBrowser = true;
    document.addEventListener('DOMContentLoaded', function () {
      document.getElementById('oldbrowser').removeAttribute('hidden');
    });
  }
})();
</script>
</head>
<body>
<canvas id="game"></canvas>

<div id="rotate" class="overlay">
  <div class="big">🔄</div>
  <h2>Vänd på plattan!</h2>
  <p>Spelet vill vara på bredden. 🌈</p>
</div>

<div id="oldbrowser" class="overlay" hidden>
  <div class="big">🚀</div>
  <h2>Oj! Webbläsaren är för gammal.</h2>
  <p>Prova en nyare webbläsare, till exempel Chrome, så kan äventyret börja!</p>
</div>

<div id="err" class="overlay" hidden>
  <div class="big">🛠️</div>
  <h2>Hoppsan, något gick snett!</h2>
  <p>Ladda om sidan och prova igen.</p>
  <p id="errmsg" class="small"></p>
</div>

<script nomodule>
document.getElementById('oldbrowser').removeAttribute('hidden');
</script>
<script defer src="vendor/matter.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
